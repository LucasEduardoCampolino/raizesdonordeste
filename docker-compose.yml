services:

  mysql:
    image: mysql:8
    container_name: mysql_raizes
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: api_raizes
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:8080"

volumes:
  mysql_data: